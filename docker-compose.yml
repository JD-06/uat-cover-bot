services:

  waha:
    image: devlikeapro/waha
    restart: unless-stopped
    environment:
      - WHATSAPP_HOOK_URL=http://bot:5000/webhook
      - WHATSAPP_HOOK_EVENTS=message
      - WHATSAPP_API_KEY=${WAHA_API_KEY}
    volumes:
      - waha_sessions:/app/.sessions
    networks:
      - dokploy-network

  bot:
    build: .
    restart: unless-stopped
    environment:
      - WAHA_URL=http://waha:3000
      - WAHA_API_KEY=${WAHA_API_KEY}
    depends_on:
      - waha
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wppbot.rule=PathPrefix(`/wppbot`)"
      - "traefik.http.routers.wppbot.entrypoints=web"
      - "traefik.http.services.wppbot.loadbalancer.server.port=5000"
      - "traefik.http.middlewares.wppbot-strip.stripprefix.prefixes=/wppbot"
      - "traefik.http.routers.wppbot.middlewares=wppbot-strip"

networks:
  dokploy-network:
    external: true

volumes:
  waha_sessions:
