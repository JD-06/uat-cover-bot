services:

  waha:
    image: devlikeapro/waha
    restart: unless-stopped
    environment:
      - WHATSAPP_HOOK_URL=http://bot:5000/webhook
      - WHATSAPP_HOOK_EVENTS=message
    volumes:
      - waha_sessions:/app/.sessions

  bot:
    build: .
    restart: unless-stopped
    environment:
      - WAHA_URL=http://waha:3000
    depends_on:
      - waha

volumes:
  waha_sessions:
